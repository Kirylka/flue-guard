name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24 # npm >= 11.5 required for OIDC trusted publishing
          cache: npm
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm test
      - run: npx -y publint
      - run: npx -y @arethetypeswrong/cli --pack --ignore-rules cjs-resolves-to-esm no-resolution
      - run: npm publish # OIDC: no token; provenance attached automatically
      - run: gh release create "$GITHUB_REF_NAME" --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
